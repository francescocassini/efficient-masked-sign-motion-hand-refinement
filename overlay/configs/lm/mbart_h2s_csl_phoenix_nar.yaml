target: mGPT.archs.mgpt_mbart_nar.Mbart_Based_MLM_NAR
params:
  model_type: mbart_multi
  model_path: ./deps/mbart-h2s-csl-phoenix
  num_heads: 3
  stage: ${TRAIN.STAGE}
  motion_codebook_size: ${model.params.codebook_size}
  ablation: ${ABLATION}
  # First controlled test: masked NAR only. On-policy training is a later ablation.
  nar_steps: 12
  nar_min_mask_ratio: 0.05
  nar_on_policy_prob: 0.0

