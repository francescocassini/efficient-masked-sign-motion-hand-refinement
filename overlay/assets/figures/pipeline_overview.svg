<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="520" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">Efficient masked sign motion generation pipeline</title>
  <desc id="desc">Overview of the paper pipeline: input text, text encoder and length estimate, Masked-NAR, HandPolish, PoseSelect, VQ decode, and full-body SMPL-X sign motion.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2c3440"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .box { fill: #ffffff; stroke: #2c3440; stroke-width: 2; rx: 8; }
      .box-soft { fill: #f4f8fb; stroke: #2c3440; stroke-width: 2; rx: 8; }
      .box-hand { fill: #fff7ef; stroke: #9a5a16; stroke-width: 2; rx: 8; }
      .box-learned { fill: #f3f0ff; stroke: #5f4aa0; stroke-width: 2; rx: 8; }
      .box-out { fill: #f1faf5; stroke: #276749; stroke-width: 2; rx: 8; }
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #17202a; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #17202a; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 12px Arial, Helvetica, sans-serif; fill: #475569; }
      .arrow { stroke: #2c3440; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .token-body { fill: #d9dee7; stroke: #6b7280; }
      .token-left { fill: #bee3f8; stroke: #2b6cb0; }
      .token-right { fill: #fed7d7; stroke: #c53030; }
      .token-mask { fill: #ffffff; stroke: #94a3b8; stroke-dasharray: 4 3; }
      .token-edit { stroke: #b7791f; stroke-width: 3; }
      .token-select { stroke: #5f4aa0; stroke-width: 3; }
      .lock { font: 700 14px Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1320" height="520"/>
  <text class="title" x="42" y="44">Efficient masked decoding with hand-aware token refinement</text>
  <text class="small" x="42" y="70">SOKE-compatible tokenizer and VQ decoder are kept fixed; the paper studies decoding and hand-token refinement.</text>

  <rect class="box" x="42" y="124" width="150" height="170"/>
  <text class="label" x="70" y="160">Input text</text>
  <text class="small" x="66" y="198">Written sentence</text>
  <text class="tiny" x="66" y="224">e.g. weather/news</text>
  <text class="tiny" x="66" y="246">sign prompt</text>

  <line class="arrow" x1="202" y1="209" x2="255" y2="209"/>

  <rect class="box-soft" x="268" y="124" width="178" height="170"/>
  <text class="label" x="296" y="156">Text encoder</text>
  <text class="label" x="300" y="181">+ length</text>
  <text class="small" x="292" y="217">Predict token length</text>
  <text class="tiny" x="292" y="242">No ground-truth</text>
  <text class="tiny" x="292" y="260">length at test time</text>

  <line class="arrow" x1="456" y1="209" x2="510" y2="209"/>

  <rect class="box-soft" x="524" y="92" width="220" height="234"/>
  <text class="label" x="578" y="126">Masked-NAR</text>
  <text class="small" x="552" y="153">parallel iterative decoding</text>
  <text class="tiny" x="558" y="177">body / left hand / right hand</text>
  <g transform="translate(558 198)">
    <text class="tiny" x="-34" y="15">Body</text>
    <rect class="token-body" x="6" y="0" width="22" height="22"/>
    <rect class="token-mask" x="34" y="0" width="22" height="22"/>
    <rect class="token-body" x="62" y="0" width="22" height="22"/>
    <rect class="token-mask" x="90" y="0" width="22" height="22"/>
    <rect class="token-body" x="118" y="0" width="22" height="22"/>
    <text class="tiny" x="-24" y="51">LH</text>
    <rect class="token-left" x="6" y="36" width="22" height="22"/>
    <rect class="token-mask" x="34" y="36" width="22" height="22"/>
    <rect class="token-left" x="62" y="36" width="22" height="22"/>
    <rect class="token-mask" x="90" y="36" width="22" height="22"/>
    <rect class="token-left" x="118" y="36" width="22" height="22"/>
    <text class="tiny" x="-24" y="87">RH</text>
    <rect class="token-right" x="6" y="72" width="22" height="22"/>
    <rect class="token-right" x="34" y="72" width="22" height="22"/>
    <rect class="token-mask" x="62" y="72" width="22" height="22"/>
    <rect class="token-right" x="90" y="72" width="22" height="22"/>
    <rect class="token-mask" x="118" y="72" width="22" height="22"/>
  </g>

  <line class="arrow" x1="754" y1="209" x2="807" y2="209"/>

  <rect class="box-hand" x="822" y="92" width="220" height="234"/>
  <text class="label" x="878" y="126">HandPolish</text>
  <text class="small" x="848" y="153">training-free hand remasking</text>
  <text class="tiny" x="858" y="177">body stream protected</text>
  <g transform="translate(858 198)">
    <text class="lock" x="-40" y="15">Body</text>
    <rect class="token-body" x="6" y="0" width="22" height="22"/>
    <rect class="token-body" x="34" y="0" width="22" height="22"/>
    <rect class="token-body" x="62" y="0" width="22" height="22"/>
    <rect class="token-body" x="90" y="0" width="22" height="22"/>
    <rect class="token-body" x="118" y="0" width="22" height="22"/>
    <text class="tiny" x="-24" y="51">LH</text>
    <rect class="token-left" x="6" y="36" width="22" height="22"/>
    <rect class="token-left token-edit" x="34" y="36" width="22" height="22"/>
    <rect class="token-left" x="62" y="36" width="22" height="22"/>
    <rect class="token-left token-edit" x="90" y="36" width="22" height="22"/>
    <rect class="token-left" x="118" y="36" width="22" height="22"/>
    <text class="tiny" x="-24" y="87">RH</text>
    <rect class="token-right" x="6" y="72" width="22" height="22"/>
    <rect class="token-right" x="34" y="72" width="22" height="22"/>
    <rect class="token-right token-edit" x="62" y="72" width="22" height="22"/>
    <rect class="token-right" x="90" y="72" width="22" height="22"/>
    <rect class="token-right token-edit" x="118" y="72" width="22" height="22"/>
  </g>

  <line class="arrow" x1="1052" y1="209" x2="1104" y2="209"/>

  <rect class="box-learned" x="1118" y="92" width="160" height="234"/>
  <text class="label" x="1150" y="126">PoseSelect</text>
  <text class="small" x="1144" y="153">learned top-k</text>
  <text class="small" x="1148" y="174">hand selector</text>
  <text class="tiny" x="1142" y="199">GT-free inference</text>
  <g transform="translate(1150 226)">
    <rect class="token-left" x="0" y="0" width="24" height="24"/>
    <rect class="token-left" x="32" y="0" width="24" height="24"/>
    <rect class="token-left token-select" x="64" y="0" width="24" height="24"/>
    <text class="small" x="96" y="19">select</text>
    <rect class="token-right" x="0" y="44" width="24" height="24"/>
    <rect class="token-right token-select" x="32" y="44" width="24" height="24"/>
    <rect class="token-right" x="64" y="44" width="24" height="24"/>
    <text class="small" x="96" y="63">select</text>
  </g>

  <line class="arrow" x1="1198" y1="336" x2="1198" y2="372"/>

  <rect class="box-out" x="1000" y="386" width="396" height="92" transform="translate(-198 0)"/>
  <text class="label" x="840" y="420">VQ decode</text>
  <text class="small" x="840" y="449">full-body SMPL-X sign motion</text>
  <line class="arrow" x1="760" y1="432" x2="820" y2="432"/>
  <g transform="translate(690 390)">
    <circle cx="20" cy="18" r="13" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <line x1="20" y1="31" x2="20" y2="66" stroke="#1e40af" stroke-width="4"/>
    <line x1="20" y1="45" x2="0" y2="62" stroke="#1e40af" stroke-width="4"/>
    <line x1="20" y1="45" x2="44" y2="58" stroke="#1e40af" stroke-width="4"/>
    <line x1="20" y1="66" x2="4" y2="92" stroke="#1e40af" stroke-width="4"/>
    <line x1="20" y1="66" x2="40" y2="92" stroke="#1e40af" stroke-width="4"/>
  </g>

  <text class="tiny" x="42" y="486">Legend: gray = body tokens, blue/red = left/right hand tokens, dashed = masked, orange outline = HandPolish remasking, purple outline = PoseSelect choice.</text>
</svg>
